version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  auth-service:
    build: ./auth-service
    ports:
      - "4001:4001"
    depends_on:
      - rabbitmq
      - mongo

  job-service:
    build: ./job-service
    ports:
      - "4002:4002"
    depends_on:
      - rabbitmq
      - mongo

  application-service:
    build: ./application-service
    ports:
      - "4003:4003"
    depends_on:
      - rabbitmq
      - mongo

  notification-service:
    build: ./notification-service
    ports:
      - "4004:4004"
    depends_on:
      - rabbitmq
      - mongo
      - postgres

  ai-service:
    build: ./ai-service
    ports:
      - "4005:4005"
    depends_on:
      - rabbitmq
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

volumes:
  postgres-data: